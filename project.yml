name: Smoke Launcher
options:
  bundleIdPrefix: com.smokelauncher
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  Smoke Launcher:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: "Smoke Launcher"
        excludes:
          - "*.entitlements"
    resources:
      - "Smoke Launcher/Resources"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smokelauncher.app
        PRODUCT_NAME: "Smoke Launcher"
        INFOPLIST_FILE: "Smoke Launcher/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "Smoke Launcher/Smoke Launcher.entitlements"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
    entitlements:
      path: "Smoke Launcher/Smoke Launcher.entitlements"

schemes:
  Smoke Launcher:
    build:
      targets:
        Smoke Launcher: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
